name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: teamdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/teamdesk_test
      JWT_ACCESS_SECRET: ci-test-secret-access
      JWT_REFRESH_SECRET: ci-test-secret-refresh
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/teamdesk_test
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run migrations against CI database
        run: npx prisma migrate deploy

      - name: Run test suite
        run: npm test
